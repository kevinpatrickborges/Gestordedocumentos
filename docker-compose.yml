services:
  postgres:
    image: postgres:15-alpine
    container_name: sgc-itep-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sgc_itep
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./backups:/backups
    networks:
      - sgc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sgc_itep"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: sgc-itep-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sgc-network
    command: redis-server --appendonly yes

  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: sgc-itep-pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   networks:
  #     - sgc-network
  #   depends_on:
  #     - postgres

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgc-itep-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - sgc-network
    command: ["node", "dist/src/main.js"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  sgc-network:
    driver: bridge
